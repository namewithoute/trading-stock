services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: trading_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading_network
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    ports:
      - "6379:6379"
    networks:
      - trading_network

  # 3. Kafka Stack (KRaft mode — no ZooKeeper)
  #
  # Listener layout:
  #   EXTERNAL  → localhost:9092        — for the Go app running on host machine
  #   INTERNAL  → trading_kafka:29092   — for containers inside Docker network (kafka-ui)
  #   CONTROLLER→ trading_kafka:9093    — Raft controller (internal only)
  kafka:
    image: apache/kafka:latest
    container_name: trading_kafka
    ports:
      - "9092:9092"   # EXTERNAL: exposed to host machine
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller

      # Bind on all interfaces for each listener
      - KAFKA_LISTENERS=EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093

      # What Kafka advertises to clients:
      #   EXTERNAL → host machine connects via localhost:9092
      #   INTERNAL → other Docker containers connect via trading_kafka:29092
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://localhost:9092,INTERNAL://trading_kafka:29092

      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@trading_kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - trading_network

  # 4. Kafka UI (http://localhost:8085)
  #    Uses INTERNAL listener — it's inside the Docker network
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trading_kafka_ui
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      # ✅ FIXED: use INTERNAL listener (container-to-container)
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=trading_kafka:29092
    depends_on:
      - kafka
    networks:
      - trading_network
  connect:
    image: debezium/connect:2.5
    container_name: trading_connect
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: trading_kafka:29092
      GROUP_ID: "1"
      REST_ADVERTISED_HOST_NAME: connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      INTERNAL_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      INTERNAL_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    networks:
      - trading_network


networks:
  trading_network:
    driver: bridge

volumes:
  postgres_data:
